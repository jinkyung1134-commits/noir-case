<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 | NOIR CASE</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#050506" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=20260530-cartbadge" />
  </head>
  <body class="admin-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="NOIR CASE 홈">
        <span class="brand-mark">N</span>
        <span>NOIR CASE</span>
      </a>
      <nav class="nav-links" aria-label="관리자 메뉴">
        <a href="#hero-admin">메인페이지 설정</a>
        <a href="#products-admin">상품관리 설정</a>
        <a href="#orders-admin">주문관리</a>
      </nav>
      <a class="admin-open" href="index.html">홈페이지 보기</a>
    </header>

    <main class="admin-shell admin-redesign">
      <section class="admin-hero">
        <p class="eyebrow">Admin Console</p>
        <h1>메인 화면과 상품을 분리해서 관리합니다.</h1>
        <p>각 메인 슬라이드마다 상품, 밝기, 이미지 크기, 블러 영역을 따로 설정하고 저장 전 미리보기로 확인할 수 있습니다.</p>
      </section>

      <section class="admin-workspace" id="hero-admin">
        <div class="admin-toolbar">
          <div>
            <p class="eyebrow">Main Page</p>
            <h2>메인페이지 설정</h2>
          </div>
          <button class="secondary-btn" type="button" data-add-hero-slide>슬라이드 추가</button>
        </div>
        <form class="admin-board" data-hero-form>
          <div class="admin-list-panel">
            <strong>메인 슬라이드</strong>
            <div class="admin-item-list" data-hero-slide-list></div>
          </div>
          <div class="admin-edit-panel" data-hero-editor></div>
        </form>
      </section>

      <section class="admin-workspace" id="products-admin">
        <div class="admin-toolbar">
          <div>
            <p class="eyebrow">Products</p>
            <h2>상품관리 설정</h2>
          </div>
          <div class="editor-actions">
            <button class="secondary-btn" type="button" data-add-product>새 상품</button>
            <button class="danger-btn" type="button" data-reset-products>상품 초기화</button>
          </div>
        </div>
        <form class="admin-board" data-admin-editor>
          <div class="admin-list-panel">
            <strong>등록된 상품</strong>
            <div class="admin-item-list product-strip" data-product-list></div>
          </div>
          <div class="admin-edit-panel" data-product-editor></div>
        </form>
      </section>

      <section class="admin-workspace order-workspace" id="orders-admin">
        <div class="admin-toolbar">
          <div>
            <p class="eyebrow">Orders</p>
            <h2>주문관리</h2>
          </div>
        </div>
        <div class="order-list" data-order-list></div>
      </section>
    </main>

    <div class="toast" data-toast role="status" aria-live="polite"></div>

    <script src="config.js"></script>
    <script src="i18n.js?v=20260530-cartcopy"></script>
    <script src="store.js"></script>
    <script src="admin.js?v=20260530-orderstatus"></script>
  </body>
</html>
